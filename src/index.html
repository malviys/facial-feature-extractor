<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #f0f0f0;
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }
  h1 { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
  h1 span { color: #e8ff47; }
  .sub { font-family: 'DM Mono', monospace; font-size: 13px; color: #555; margin-bottom: 40px; }

  .card {
    background: #181818;
    border: 1px solid #272727;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 20px;
  }

  .drop-zone {
    border: 2px dashed #303030;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 20px;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: #e8ff47; background: rgba(232,255,71,0.04); }
  .drop-icon { font-size: 36px; margin-bottom: 12px; }
  .drop-text { font-size: 14px; color: #888; font-family: 'DM Mono', monospace; }
  .drop-text strong { color: #e8ff47; cursor: pointer; }
  #fileInput { display: none; }

  .preview-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .thumb { position: relative; border-radius: 8px; overflow: hidden; width: 80px; height: 80px; background: #222; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb .remove {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.7); border: none; color: #fff;
    width: 20px; height: 20px; border-radius: 50%; font-size: 11px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  label.field-label {
    font-family: 'DM Mono', monospace; font-size: 12px; color: #555;
    display: block; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase;
  }

  .features-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .chip {
    font-family: 'DM Mono', monospace; font-size: 12px; padding: 6px 12px;
    border-radius: 100px; border: 1px solid #2a2a2a; cursor: pointer;
    transition: all 0.15s; background: transparent; color: #888;
  }
  .chip.active { background: rgba(232,255,71,0.12); border-color: #e8ff47; color: #e8ff47; }

  textarea {
    width: 100%; background: #111; border: 1px solid #272727; border-radius: 10px;
    color: #f0f0f0; font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 12px; resize: vertical; min-height: 72px; outline: none;
    transition: border-color 0.2s; margin-bottom: 16px;
  }
  textarea:focus { border-color: #e8ff47; }

  .analyze-btn {
    width: 100%; background: #e8ff47; color: #0f0f0f; border: none;
    border-radius: 10px; padding: 14px; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
  }
  .analyze-btn:hover { opacity: 0.88; }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result-card {
    background: #181818; border: 1px solid #272727; border-radius: 16px;
    padding: 28px; width: 100%; max-width: 560px; display: none;
  }
  .result-card.visible { display: block; }
  .result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .result-dot { width: 8px; height: 8px; border-radius: 50%; background: #47ffb2; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .result-title { font-size: 13px; font-family: 'DM Mono', monospace; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }

  .feature-block { margin-bottom: 12px; padding: 14px; background: #111; border-radius: 10px; border: 1px solid #222; }
  .feature-block-label { font-size: 11px; color: #e8ff47; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; font-family: 'DM Mono', monospace; }
  .feature-block-value { font-family: 'DM Mono', monospace; font-size: 13px; color: #ccc; line-height: 1.6; }

  .loading { display: flex; align-items: center; gap: 12px; font-family: 'DM Mono', monospace; font-size: 13px; color: #555; }
  .spinner { width: 18px; height: 18px; border: 2px solid #2a2a2a; border-top-color: #e8ff47; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #ff6b6b; font-family: 'DM Mono', monospace; font-size: 13px; }
  .result-raw { font-family: 'DM Mono', monospace; font-size: 13px; color: #ccc; line-height: 1.8; white-space: pre-wrap; }
</style>
</head>
<body>

<h1>Face <span>Analyzer</span></h1>
<p class="sub">Upload images → Extract facial features via AI</p>

<div class="card">
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">🖼️</div>
    <div class="drop-text">
      Drop images here or <strong onclick="document.getElementById('fileInput').click()">browse</strong>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <div class="preview-grid" id="previewGrid"></div>

  <label class="field-label">Features to extract</label>
  <div class="features-grid" id="chipsContainer">
    <button class="chip active" data-feature="Face Shape">Face Shape</button>
    <button class="chip active" data-feature="Skin Tone">Skin Tone</button>
    <button class="chip active" data-feature="Eye Color">Eye Color</button>
    <button class="chip active" data-feature="Hair Color">Hair Color</button>
    <button class="chip" data-feature="Facial Symmetry">Facial Symmetry</button>
    <button class="chip" data-feature="Skin Texture">Skin Texture</button>
    <button class="chip" data-feature="Jawline Type">Jawline Type</button>
    <button class="chip" data-feature="Lip Shape">Lip Shape</button>
    <button class="chip" data-feature="Eyebrow Shape">Eyebrow Shape</button>
    <button class="chip" data-feature="Nose Shape">Nose Shape</button>
  </div>

  <label class="field-label">Additional instructions (optional)</label>
  <textarea id="customPrompt" placeholder="e.g. Also describe lighting, head pose, approximate age..."></textarea>

  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">Analyze Images</button>
</div>

<div class="result-card" id="resultCard">
  <div class="result-header">
    <div class="result-dot"></div>
    <div class="result-title">Analysis Results</div>
  </div>
  <div id="resultBody"></div>
</div>

<script>
  const images = [];

  // Drag & drop
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles([...e.dataTransfer.files]); });
  document.getElementById('fileInput').addEventListener('change', e => { handleFiles([...e.target.files]); e.target.value = ''; });

  function handleFiles(files) {
    files.filter(f => f.type.startsWith('image/')).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const id = Date.now() + Math.random();
        const base64 = e.target.result.split(',')[1];
        images.push({ id, file, base64, src: e.target.result });
        const grid = document.getElementById('previewGrid');
        const div = document.createElement('div');
        div.className = 'thumb';
        div.dataset.id = id;
        div.innerHTML = `<img src="${e.target.result}"><button class="remove" onclick="removeImage(${id})">✕</button>`;
        grid.appendChild(div);
      };
      reader.readAsDataURL(file);
    });
  }

  function removeImage(id) {
    const idx = images.findIndex(i => i.id === id);
    if (idx > -1) images.splice(idx, 1);
    document.querySelector(`.thumb[data-id="${id}"]`)?.remove();
  }

  document.getElementById('chipsContainer').querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => c.classList.toggle('active'));
  });

  async function analyze() {
    if (!images.length) return alert('Please upload at least one image.');
    const features = [...document.querySelectorAll('.chip.active')].map(c => c.dataset.feature);
    if (!features.length) return alert('Select at least one feature.');

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = 'Analyzing...';

    const resultCard = document.getElementById('resultCard');
    const resultBody = document.getElementById('resultBody');
    resultCard.classList.add('visible');
    resultBody.innerHTML = `<div class="loading"><div class="spinner"></div>Processing ${images.length} image(s)...</div>`;

    const customPrompt = document.getElementById('customPrompt').value.trim();
    const userText = `Analyze the provided face image(s) and extract: ${features.join(', ')}.${customPrompt ? '\n\n' + customPrompt : ''}

Return ONLY a valid JSON object like:
{
  "Face Shape": "oval with slightly wider forehead",
  "Skin Tone": "warm medium brown, Fitzpatrick type IV"
}
No markdown, no extra text.`;

    const content = images.map(img => ({
      type: 'image',
      source: { type: 'base64', media_type: img.file.type || 'image/jpeg', data: img.base64 }
    }));
    content.push({ type: 'text', text: userText });

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are a facial feature analysis expert. Analyze face images and return results as valid JSON only — no markdown, no preamble.',
          messages: [{ role: 'user', content }]
        })
      });

      const data = await res.json();
      if (data.error) { resultBody.innerHTML = `<div class="error">Error: ${data.error.message}</div>`; return; }

      const text = data.content?.find(b => b.type === 'text')?.text || '';
      let parsed;
      try {
        parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
      } catch {
        resultBody.innerHTML = `<div class="result-raw">${text}</div>`;
        return;
      }

      resultBody.innerHTML = Object.entries(parsed).map(([k, v]) => `
        <div class="feature-block">
          <div class="feature-block-label">${k}</div>
          <div class="feature-block-value">${v}</div>
        </div>`).join('');
    } catch (err) {
      resultBody.innerHTML = `<div class="error">Failed: ${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Analyze Images';
    }
  }
</script>
</body>
</html>
